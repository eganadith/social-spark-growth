[build]
  command = "bun run build"
  publish = "dist"

# Vite embeds public env vars into JS under dist/. Skip that output in Netlify’s secrets scan.
# Never paste the same string as site env SECRETS_SCAN_OMIT_KEYS into this file (build will fail).
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist/**"
